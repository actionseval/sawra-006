name: Tests
# on: push
on: [repository_dispatch, workflow_dispatch]
jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
        python-version:
          - '3.13'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Dependencies
        run: |
          apt install -y adduser base-files bash bash-completion command-not-found cron debconf distro-info-data e2fsprogs fuse3 gettext-base hdparm keyutils libattr1:amd64 libaudit-common libbz2-1.0:amd64 libc-bin libc6:amd64 libexpat1:amd64 liblzma5:amd64 libmagic1:amd64 libmecab2:amd64 libncursesw6:amd64 libpam-runtime libpython3.13-stdlib:amd64 libsensors-config libssl3:amd64 libtinfo6:amd64 libtirpc-common locales login logrotate lsb-release ltrace mailcap man-db media-types multipath-tools nano ncurses-base netbase nftables openssl overlayroot procps python3-zope.interface python3.13 rsyslog screen sudo tar tzdata ucf unixodbc-common usb-modeswitch walinuxagent wget zlib1g:amd64
      - name: Execute Tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install tox
          tox -e tests
